version: '3.8'

services:
  espeasy-build:
    build: .
    container_name: espeasy-build
    volumes:
      # Kaynak kodu mount et
      - .:/workspace
      # Build cache için persistent volume
      - pio-cache:/workspace/.pio
      - build-output:/workspace/build_output
    environment:
      - PLATFORMIO_CORE_DIR=/workspace/.pio
    # devices:
    #   # Windows'ta USB seri port (USB/IP gerekli)
    #   # Linux: - /dev/ttyUSB0:/dev/ttyUSB0
    working_dir: /workspace
    command: tail -f /dev/null  # Container'ı çalışır tut

volumes:
  pio-cache:
  build-output:
